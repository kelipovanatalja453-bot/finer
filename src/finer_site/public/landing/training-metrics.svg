<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Finer OS evaluation metrics</title>
  <desc id="desc">Three evaluation metrics for DPO training: structure compliance, evidence attachment, and preference win rate.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d8cec0" stroke-width="1" opacity=".35"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#3c2818" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="#f3efe7"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <rect x="48" y="48" width="1104" height="624" rx="8" fill="#fffdf8" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="86" y="102" fill="#9f1d22" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18" font-weight="800" letter-spacing="4">EVALUATION</text>
  <text x="86" y="142" fill="#181512" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="36" font-weight="700">三项指标，两项不花一分钱</text>
  <text x="86" y="178" fill="#806f61" font-family="Avenir Next, PingFang SC, sans-serif" font-size="18">先用确定性指标拦住结构错误和编造，再用 judge 评偏好胜率。</text>

  <g transform="translate(86 236)">
    <rect x="0" y="0" width="320" height="320" rx="8" fill="#ffffff" stroke="#d5dce5"/>
    <rect x="0" y="0" width="320" height="6" fill="#9f1d22"/>
    <text x="28" y="52" fill="#181512" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="27" font-weight="700">结构合规率</text>
    <text x="28" y="82" fill="#806f61" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14">structure_compliance_rate</text>
    <circle cx="160" cy="168" r="64" fill="none" stroke="#eadfda" stroke-width="18"/>
    <path d="M160 104 A64 64 0 1 1 97 179" fill="none" stroke="#9f1d22" stroke-width="18" stroke-linecap="round"/>
    <text x="160" y="162" text-anchor="middle" fill="#181512" font-family="Avenir Next, PingFang SC, sans-serif" font-size="34" font-weight="800">JSON</text>
    <text x="160" y="188" text-anchor="middle" fill="#806f61" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13">Schema pass</text>
    <rect x="28" y="260" width="264" height="34" rx="4" fill="#f7f3ed"/>
    <text x="160" y="282" text-anchor="middle" fill="#6a5b4c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="700">确定性 · 免费 · 可复跑</text>
  </g>

  <g transform="translate(440 236)">
    <rect x="0" y="0" width="320" height="320" rx="8" fill="#ffffff" stroke="#d5dce5"/>
    <rect x="0" y="0" width="320" height="6" fill="#1f6a67"/>
    <text x="28" y="52" fill="#181512" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="27" font-weight="700">证据挂靠率</text>
    <text x="28" y="82" fill="#806f61" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14">evidence_attachment_rate</text>
    <rect x="44" y="126" width="232" height="28" rx="4" fill="#f7f3ed"/>
    <rect x="44" y="126" width="176" height="28" rx="4" fill="#dfeeea"/>
    <text x="58" y="145" fill="#1f6a67" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12" font-weight="800">ticker in evidence_text</text>
    <rect x="44" y="176" width="232" height="28" rx="4" fill="#f7f3ed"/>
    <rect x="44" y="176" width="146" height="28" rx="4" fill="#dfeeea"/>
    <text x="58" y="195" fill="#1f6a67" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12" font-weight="800">price span found</text>
    <rect x="44" y="226" width="232" height="28" rx="4" fill="#fff1f1"/>
    <rect x="44" y="226" width="62" height="28" rx="4" fill="#e8c7c9"/>
    <text x="58" y="245" fill="#9f1d22" font-family="Avenir Next, PingFang SC, sans-serif" font-size="12" font-weight="800">hallucination</text>
    <rect x="28" y="260" width="264" height="34" rx="4" fill="#f7f3ed"/>
    <text x="160" y="282" text-anchor="middle" fill="#6a5b4c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="700">确定性 · 免费 · 直测不编造</text>
  </g>

  <g transform="translate(794 236)">
    <rect x="0" y="0" width="320" height="320" rx="8" fill="#ffffff" stroke="#d5dce5"/>
    <rect x="0" y="0" width="320" height="6" fill="#9b7b45"/>
    <text x="28" y="52" fill="#181512" font-family="Songti SC, Noto Serif CJK SC, serif" font-size="27" font-weight="700">偏好胜率</text>
    <text x="28" y="82" fill="#806f61" font-family="Avenir Next, PingFang SC, sans-serif" font-size="14">preference_win_rate</text>
    <g transform="translate(48 122)" font-family="Avenir Next, PingFang SC, sans-serif">
      <rect x="0" y="0" width="96" height="116" rx="7" fill="#f7fbf9" stroke="#cbe2d8"/>
      <text x="48" y="35" text-anchor="middle" fill="#0f7a54" font-size="16" font-weight="800">chosen</text>
      <text x="48" y="72" text-anchor="middle" fill="#181512" font-size="14">证据对齐</text>
      <text x="48" y="94" text-anchor="middle" fill="#181512" font-size="14">敢弃权</text>
      <text x="142" y="61" text-anchor="middle" fill="#9b7b45" font-size="22" font-weight="900">≻</text>
      <rect x="188" y="0" width="96" height="116" rx="7" fill="#fff8f8" stroke="#ecd1d3"/>
      <text x="236" y="35" text-anchor="middle" fill="#9f1d22" font-size="16" font-weight="800">rejected</text>
      <text x="236" y="72" text-anchor="middle" fill="#181512" font-size="14">猜方向</text>
      <text x="236" y="94" text-anchor="middle" fill="#181512" font-size="14">丢证据</text>
    </g>
    <rect x="28" y="260" width="264" height="34" rx="4" fill="#f7f3ed"/>
    <text x="160" y="282" text-anchor="middle" fill="#6a5b4c" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="700">需要 judge · A/B 互换防偏置</text>
  </g>

  <rect x="86" y="590" width="1028" height="44" rx="5" fill="#181512"/>
  <text x="110" y="618" fill="#ffffff" font-family="SFMono-Regular, Menlo, monospace" font-size="15">eval_compare.py --before before.jsonl --after after.jsonl --gold eval_set.jsonl</text>
</svg>
